<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatRoleAmI.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WhatRoleAmI.Client.styles.css" rel="stylesheet" />
    <style>
        .quiz-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            font-family: sans-serif;
        }

        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: #7F77DD;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .question-count {
            color: #888;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            text-align: left;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

            .option-btn:hover {
                border-color: #7F77DD;
                background: #EEEDFE;
            }

            .option-btn.selected {
                border-color: #7F77DD;
                background: #EEEDFE;
                color: #3C3489;
                font-weight: 500;
            }

        .next-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #7F77DD;
            background: white;
            color: #7F77DD;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }

            .next-btn:hover {
                background: #EEEDFE;
            }

            .next-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        .result-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 16px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .emoji {
            font-size: 28px;
        }

        .role {
            font-weight: 500;
            font-size: 16px;
            margin: 0;
        }

        .match {
            color: #7F77DD;
            font-size: 13px;
            margin: 0;
        }

        .match-bar {
            height: 4px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .match-fill {
            height: 100%;
            background: #7F77DD;
            border-radius: 4px;
        }

        .why {
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .skill-tag {
            font-size: 12px;
            background: #f5f5f5;
            color: #555;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #eee;
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
